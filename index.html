<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veria — the language your eyes already speak.</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="app/css/tokens.css">
    <link rel="stylesheet" href="app/css/main.css">
    <link rel="stylesheet" href="app/css/showcase.css">
    <link rel="stylesheet" href="app/css/visuals.css">
</head>

<body>
    <nav class="top-nav">
        <div class="nav-left">
            <button id="sidebar-toggle" aria-label="toggle sidebar">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="5" r="2.5"></circle>
                    <circle cx="18.5" cy="10" r="2.5" fill="currentColor"></circle>
                    <circle cx="16" cy="18" r="2.5"></circle>
                    <circle cx="8" cy="18" r="2.5"></circle>
                    <circle cx="5.5" cy="10" r="2.5" fill="currentColor"></circle>
                </svg>
            </button>
        </div>
        <div class="nav-center">
            <a href="#/" class="logo" aria-label="veria home">
                <span class="logo-text">veria</span>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="5" r="2.5"></circle>
                    <circle cx="18.5" cy="10" r="2.5" fill="currentColor"></circle>
                    <circle cx="16" cy="18" r="2.5"></circle>
                    <circle cx="8" cy="18" r="2.5"></circle>
                    <circle cx="5.5" cy="10" r="2.5" fill="currentColor"></circle>
                </svg>
            </a>
        </div>
        <div class="nav-right">
            <button id="bookmarks-btn" aria-label="view bookmarks">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 3h14v18l-7-4-7 4V3z"></path>
                    <circle cx="12" cy="9" r="2.5" class="marker-dot"></circle>
                </svg>
            </button>
            <button id="theme-toggle" aria-label="toggle theme">
                <svg class="sun" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8">
                    <circle cx="12" cy="12" r="4.5"></circle>
                    <line x1="12" y1="1" x2="12" y2="4"></line>
                    <line x1="12" y1="20" x2="12" y2="23"></line>
                    <line x1="1" y1="12" x2="4" y2="12"></line>
                    <line x1="20" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"></line>
                    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"></line>
                    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"></line>
                    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-section">
                    <h2 class="sidebar-title">visual styles</h2>
                    <ul id="styles-list" class="sidebar-list">
                        <!-- populated via js -->
                    </ul>
                </div>
                <div class="sidebar-section">
                    <h2 class="sidebar-title">ui components</h2>
                    <ul id="components-list" class="sidebar-list">
                        <!-- populated via js -->
                    </ul>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div id="content-mount">
                <!-- Hardcoded landing page for reliability -->
                <section class="landing-page entry-page">
                    <div class="hero">
                        <div class="hero-brand">
                            <h1 class="hero-title">veria</h1>
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <circle cx="12" cy="5" r="2.5"></circle>
                                <circle cx="18.5" cy="10" r="2.5" fill="currentColor"></circle>
                                <circle cx="16" cy="18" r="2.5"></circle>
                                <circle cx="8" cy="18" r="2.5"></circle>
                                <circle cx="5.5" cy="10" r="2.5" fill="currentColor"></circle>
                            </svg>
                        </div>
                        <h2 class="hero-subtitle">the language your eyes already speak.</h2>
                        <p class="tagline">the complete design vocabulary.</p>
                        <button class="cta-primary" id="start-browsing">browse library</button>
                    </div>
                    <div class="shortcuts">
                        <button class="shortcut-btn" data-category="layouts">layouts</button>
                        <button class="shortcut-btn" data-category="navigation">navigation</button>
                        <button class="shortcut-btn" data-category="styles">visual styles</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- js: removed type="module" for local file support -->
    <script src="app/js/app.js"></script>
</body>

</html>
